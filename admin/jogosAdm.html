<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerenciamento de Jogos</title>
      <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div style="display: flex; align-items: center;">
        <a href="/admin/jogosAdm.html">
          <img src="imagens/logoGV.png" alt="Logo GameVault" class="logo">
        </a>
        <h1>GameVault</h1>
    </div>

    <nav class="menu">
      <ul>
        <li><a href="/admin/jogos.html" class="active">Controle de Jogos</a></li>
        <li><a href="/admin/usuarios.html">Controle de Usuários</a></li>
        <li><a href="/admin/dashboard.html">Painel Administrativo</a></li>
        <li><a href="#">Perfil</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- Conteúdo da página -->
<div class="container" style="display:flex;gap:40px;">
  <!-- Formulário de cadastro -->
  <section style="flex:1;">
    <h2>Novo Jogo</h2>
    <form id="formCadastro">
      <input  type="text"   id="titulo"   placeholder="Título" required><br>
      <input  type="number" id="ano"      placeholder="Ano de lançamento"><br>
      <textarea id="sinopse" placeholder="Sinopse" rows="4" required></textarea><br>
      <input  type="text"   id="categoria" placeholder="Categoria"><br>
      <input  type="file" id="imagem" accept="image/*"><br>
        <button type="submit">Cadastrar</button>
    </form>
  </section>

  <!-- Tabela de jogos -->
  <section style="flex:2;">
    <h2>Jogos cadastrados</h2>
    <table id="tabelaJogos">
      <thead>
        <tr><th>ID</th><th>Título</th><th>Ano</th><th>Ações</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
</div>

<script src="js/jogos.js"></script>
</body>
</html>
